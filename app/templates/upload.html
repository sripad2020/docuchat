{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-100">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Upload PDF Document</h2>
    
    <div id="dropzone" class="border-2 border-dashed border-gray-300 rounded-xl p-12 text-center hover:border-brand-purple hover:bg-brand-purple-light transition-colors cursor-pointer mb-6">
        <svg class="mx-auto h-12 w-12 text-gray-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
        </svg>
        <p class="text-gray-600 mb-2">Drag and drop your PDF here, or click to browse</p>
        <p class="text-xs text-gray-400">Supports large documents (500+ pages)</p>
        <input type="file" id="fileInput" class="hidden" accept=".pdf">
    </div>

    <div id="progressContainer" class="hidden">
        <div class="flex justify-between text-sm text-gray-600 mb-2">
            <span id="statusText" class="font-medium">Uploading...</span>
            <span id="statusDetail"></span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-2.5 mb-4">
            <div id="progressBar" class="bg-brand-purple h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
        <div id="actionContainer" class="text-center mt-6 hidden">
            <a id="chatLink" href="#" class="bg-brand-purple text-brand-white px-6 py-2 rounded-lg font-medium shadow-sm hover:bg-brand-purple-dark transition">Go to Chat</a>
        </div>
    </div>
</div>

<script src="/static/js/upload.js"></script>
{% endblock %}
